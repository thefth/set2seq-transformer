# WikiArt-Seq2Rank LSTM Configuration
# Artist career prediction with LSTM

# Dataset
dataset: wikiart_seq2rank
data_path: ../datasets/wikiart_seq2rank/wikiart_seq2rank.pkl
features: ../datasets/wikiart_seq2rank/wikiart_seq2rank_features_resnet34.pkl
wikiart_seq2rank_split: stratified_split
wikiart_seq2rank_ranking: overall
set_aggregate: mean

# Model Architecture
model: LSTM

# LSTM Hyperparameters
lstm_hidden_dim: 512
lstm_num_layers: 2

# Training Configuration
lr: 0.00001
batch_size: 256
epochs: 100
early_stopping_patience: 20
monitor_metric: auto
scheduler: null

# System
seed: 42
device: cuda