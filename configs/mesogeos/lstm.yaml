# Mesogeos LSTM Configuration
# Wildfire forecasting with LSTM

# Dataset
dataset: mesogeos
data_path: ../datasets/mesogeos/mesogeos_swdf.pkl
features: ../datasets/mesogeos/mesogeos_swdf_features.pkl
setting: 1
set_aggregate: max  # Aggregate sets to sequences: max or mean

# Model Architecture
model: LSTM

# LSTM Hyperparameters
lstm_hidden_dim: 512
lstm_num_layers: 2

# Training Configuration
lr: 0.0001
batch_size: 256
epochs: 100
early_stopping_patience: 20
monitor_metric: auto
scheduler: null

# System
seed: 42
device: cuda