# Mesogeos Transformer Configuration
# Wildfire forecasting with sequence modeling

# Dataset
dataset: mesogeos
data_path: ../datasets/mesogeos/mesogeos_swdf.pkl
features: ../datasets/mesogeos/mesogeos_swdf_features.pkl
setting: 1

# Model Architecture
model: Transformer

# Sequence Encoder Hyperparameters
sequence_model_dim: 512
sequence_num_heads: 8
sequence_num_layers: 6
sequence_dropout: 0.0

# Embeddings
positional_embedding: positional_encoding
temporal_embedding: timestamp_time2vec
disable_temporal_embedding: false

# Training Configuration
lr: 0.0001
batch_size: 256
epochs: 100
early_stopping_patience: 20
monitor_metric: auto
scheduler: null

# System
seed: 42
device: cuda